<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="ribbon" x1="14" y1="14" x2="66" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E3A8A" stop-opacity="1"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Single continuous ribbon: bottom-left → top-left → bottom-right → top-right -->
  <path
    d="M18 66 L18 14 L62 66 L62 14"
    stroke="url(#ribbon)"
    stroke-width="11"
    stroke-linejoin="bevel"
    stroke-linecap="butt"
    fill="none"
  />

  <!-- Fold creases — perpendicular hairlines at each pivot point -->
  <line x1="13" y1="19" x2="23" y2="9"  stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="57" y1="71" x2="67" y2="61" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="1.5" stroke-linecap="round"/>
</svg>
