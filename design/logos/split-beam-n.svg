<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="nStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E3A8A" stop-opacity="1"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Two bold gradient verticals -->
  <path d="M18 14 L18 66" stroke="url(#nStroke)" stroke-width="11" stroke-linecap="square" fill="none"/>
  <path d="M62 14 L62 66" stroke="url(#nStroke)" stroke-width="11" stroke-linecap="square" fill="none"/>

  <!-- Thin floating violet diagonal hairline (2px gaps at each terminus) -->
  <path d="M20 16 L60 64" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Accent node where the beam exits -->
  <circle cx="62" cy="66" r="2.5" fill="#7C3AED"/>
</svg>
